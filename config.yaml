vault:
  path: "D:/Obsidian/Hack - 2nd.Brain"
  assets_dir: "_assets"

r2:
  endpoint: "${R2_ENDPOINT}"
  bucket: "${R2_BUCKET}"
  public_url: "${R2_PUBLIC_URL}"

watcher:
  debounce_sec: 0.5
  formats:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".webp"
    - ".gif"
  output_format: "webp"
  quality: 80

git:
  enabled: true
  idle_minutes: 5
  commit_prefix: "auto:"

publish:
  method: "both"
  folder: "publish"
  flag: "publish"
  content_subdir: "content"
  prompt_subdir: "prompt"

blog:
  content_dir: "blog/content/posts"
  prompts_dir: "blog/content/prompts"

translation:
  enabled: true
  provider: "zai"
  model: "glm-5"
  api_key_env: "ZAI_API_KEY"
  api_base_url: ""
  frontmatter_flag: "autoTranslate"
  require_review: true
  overwrite_machine_translations: true
  targets:
    en:
      - th
    th:
      - en
